<!doctype html>
<html>
  <head>
    <title>Patient Room Light Control</title>

    <script src="https://www.gstatic.com/firebasejs/9.22.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.1/firebase-database-compat.js"></script>

    <style>
      body {
        font-family: Arial;
        text-align: center;
        background: #f2f2f2;
        margin-top: 80px;
      }

      .card {
        background: white;
        padding: 40px;
        width: 300px;
        margin: auto;
        border-radius: 10px;
        box-shadow: 0 0 10px rgba(0, 0, 0, 0.2);
      }

      button {
        width: 120px;
        height: 45px;
        font-size: 18px;
        margin: 10px;
        border: none;
        border-radius: 6px;
        cursor: pointer;
      }

      .on {
        background: #28a745;
        color: white;
      }

      .off {
        background: #dc3545;
        color: white;
      }

      .status {
        font-size: 22px;
        margin: 20px;
      }
    </style>
  </head>

  <body>
    <div class="card">
      <h2>Patient Light Control</h2>

      <div class="status">Status: <span id="lightStatus">Loading...</span></div>

      <button class="on" onclick="setLight(1)">ON</button>
      <button class="off" onclick="setLight(0)">OFF</button>
    </div>

    <script>
      // Firebase config
      const firebaseConfig = {
        apiKey: "AIzaSyAgMQPxReunCuIuwpKi5gddPMdKb_tfpuM",
        databaseURL:
          "https://facekey-85532-default-rtdb.asia-southeast1.firebasedatabase.app/",
      };

      firebase.initializeApp(firebaseConfig);

      const db = firebase.database();

      const statusText = document.getElementById("lightStatus");

      // realtime listener
      db.ref("/light").on("value", function (snapshot) {
        let state = snapshot.val();

        if (state == 1) {
          statusText.innerHTML = "ON";
          statusText.style.color = "green";
        } else {
          statusText.innerHTML = "OFF";
          statusText.style.color = "red";
        }
      });

      // control function
      function setLight(value) {
        db.ref("/light").set(value);
      }
    </script>
  </body>
</html>
